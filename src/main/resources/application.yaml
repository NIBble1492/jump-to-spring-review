spring:
  application:
    name: jump-to-spring-review
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:./db_dev;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        # 실행되는 실제 SQL을 인텔리제이 콘솔창에 출력합니다.
        show_sql: true
        # 출력되는 SQL을 보기 좋게 정렬(줄바꿈)해 줍니다.
        format_sql: true
    hibernate:
      ddl-auto: update